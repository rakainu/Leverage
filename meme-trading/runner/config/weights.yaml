cluster:
  # Lowered 2026-04-14 (min 3→2, window 30→45) to fix convergence famine:
  # after TierRebuilder tiered wallets properly, only 13 A-tier wallets remain
  # and ≥3 converging inside 30min is near-impossible. `require_a_tier_when_min`
  # guards precision: when min_wallets <= this threshold, at least 1 A-tier
  # wallet must be part of the cluster.
  min_wallets: 2
  window_minutes: 45
  require_a_tier_when_min: 2
  speed_bonus_sweet_spot_min: 10
  speed_bonus_sweet_spot_max: 20

gates:
  lp_locked_pct_min: 85
  deployer_max_pct: 5
  top10_max_pct: 70   # Tightened 2026-04-14 from 95 — real runners rarely have >70% top-10 concentration
  token_age_min_sec: 120
  token_age_max_hr: 72

weights:
  wallet_quality: 0.20
  cluster_quality: 0.15
  entry_quality: 0.15
  holder_quality: 0.15
  rug_risk: 0.15
  follow_through: 0.15
  narrative: 0.05

verdict_thresholds:
  # Lowered 2026-04-14 (watch 40→35, strong 60→55, probable 78→72) temporarily
  # to grow the OutcomeTracker dataset while we're still tuning weights.
  # Revisit after ≥50 paper positions close.
  watch: 35
  strong_candidate: 55
  probable_runner: 72

position_sizing:
  strong_candidate_sol: 0.25
  probable_runner_sol: 0.375

probe:
  follow_through_minutes: 5

wallet_tier:
  a_tier_win_rate: 0.60
  a_tier_min_trades: 5
  b_tier_win_rate: 0.35
  rebuild_hour_utc: 4
  rolling_window_days: 30

http_rate_limits:
  helius_rps: 10
  rugcheck_rps: 2
  dexscreener_rps: 3
  jupiter_rps: 5

scoring:
  rug_insider_rug_weight: 0.70
  insider_cap_threshold: 25
  insider_cap_value: 35
  neutral_fallback: 50
  version: "v1"
  reload_interval_sec: 30

executor:
  check_interval_sec: 30
  error_closure_hours: 36

  # --- Real exit policy (added 2026-04-14) ---
  # Hard stop: close immediately if pnl drops below -stop_loss_pct
  stop_loss_pct: 25.0
  # Trailing stop: only arms once peak pnl >= trail_activate_pct;
  # then exits when pnl drops trail_distance_pct below the peak
  trail_activate_pct: 30.0
  trail_distance_pct: 20.0
  # Breakeven floor (2026-04-14, ported from smc): once the trail has armed
  # (peak >= trail_activate_pct), never let the position become a loser —
  # exit if pnl drops at or below trail_breakeven_floor_pct regardless of
  # the giveback rule.
  trail_breakeven_floor_pct: 5.0
  # Time stop: close any underwater position after this many seconds
  # (default 4h — milestone snapshot still records 4h pnl before close)
  time_stop_sec: 14400
  time_stop_pnl_max: 0.0  # only time-stops if pnl is below this

cooldowns:
  # Don't rescore the same mint within this many seconds — prevents 3x rescore
  # of the same cluster as more wallets join.
  rescore_seconds: 1800

outcomes:
  poll_interval_sec: 300       # Poll DexScreener for every scored mint every 5 min
  moonshot_mcap_usd: 1000000   # FDV threshold that triggers a moonshot Telegram alert

gmgn_discovery:
  # Rich's requirement (2026-04-14): every GMGN-discovered wallet must pass
  # multi-stage vetting before joining the active pool. See
  # runner/curation/wallet_vetting.py for the funnel.
  enabled: true                # APIFY token verified on VPS 2026-04-14
  interval_hours: 2            # aggressive while tuning; move to 12-24 once stable
  cap_new_per_run: 20          # max new raw candidates admitted per cycle
  cap_active_pool: 150         # soft cap on total active wallets
  require_manual_approval: true  # graduating from shadow → active needs Rich's ack
  gmgn_filters:
    # Calibrated 2026-04-14 after first discovery cycle rejected 20/20 —
    # memecoin scalpers legitimately do 1k-5k trades/mo; 500 was too tight.
    # 10k still catches clear bots. Winrate floors loosened slightly so
    # Helius verification (Stage 3) remains the tighter gate.
    min_composite_score: 70.0
    min_7d_winrate: 0.50
    min_30d_winrate: 0.45
    min_7d_pnl_usd: 3000
    min_trade_count_30d: 20
    max_trade_count_30d: 10000
    max_avg_hold_minutes: 240
    max_largest_trade_pct_of_pnl: 0.70
    min_realized_to_unrealized_ratio: 0.50
    require_age_days: 30
  helius_verify:
    min_closed_trades: 15
    min_winrate: 0.45
    min_pnl_sol: 20
    required_tier: B            # our own tier math must compute to A or B
  behavioral:
    max_single_token_pct: 0.80
    max_hf_burst_pct: 0.50
    max_top3_pnl_pct: 0.90
  shadow:
    enabled: true
    min_trades: 10
    min_days: 2
    max_days: 7
    require_consensus_buy: true  # shadow wallet must co-buy with A-tier once
