cluster:
  min_wallets: 3
  window_minutes: 30
  speed_bonus_sweet_spot_min: 10
  speed_bonus_sweet_spot_max: 20

gates:
  lp_locked_pct_min: 85
  deployer_max_pct: 5
  top10_max_pct: 70   # Tightened 2026-04-14 from 95 — real runners rarely have >70% top-10 concentration
  token_age_min_sec: 120
  token_age_max_hr: 72

weights:
  wallet_quality: 0.20
  cluster_quality: 0.15
  entry_quality: 0.15
  holder_quality: 0.15
  rug_risk: 0.15
  follow_through: 0.15
  narrative: 0.05

verdict_thresholds:
  watch: 40
  strong_candidate: 60
  probable_runner: 78

position_sizing:
  strong_candidate_sol: 0.25
  probable_runner_sol: 0.375

probe:
  follow_through_minutes: 5

wallet_tier:
  a_tier_win_rate: 0.60
  a_tier_min_trades: 5
  b_tier_win_rate: 0.35
  rebuild_hour_utc: 4
  rolling_window_days: 30

http_rate_limits:
  helius_rps: 10
  rugcheck_rps: 2
  dexscreener_rps: 3
  jupiter_rps: 5

scoring:
  rug_insider_rug_weight: 0.70
  insider_cap_threshold: 25
  insider_cap_value: 35
  neutral_fallback: 50
  version: "v1"
  reload_interval_sec: 30

executor:
  check_interval_sec: 30
  error_closure_hours: 36

  # --- Real exit policy (added 2026-04-14) ---
  # Hard stop: close immediately if pnl drops below -stop_loss_pct
  stop_loss_pct: 25.0
  # Trailing stop: only arms once peak pnl >= trail_activate_pct;
  # then exits when pnl drops trail_distance_pct below the peak
  trail_activate_pct: 30.0
  trail_distance_pct: 20.0
  # Time stop: close any underwater position after this many seconds
  # (default 4h — milestone snapshot still records 4h pnl before close)
  time_stop_sec: 14400
  time_stop_pnl_max: 0.0  # only time-stops if pnl is below this

cooldowns:
  # Don't rescore the same mint within this many seconds — prevents 3x rescore
  # of the same cluster as more wallets join.
  rescore_seconds: 1800

outcomes:
  poll_interval_sec: 300       # Poll DexScreener for every scored mint every 5 min
  moonshot_mcap_usd: 1000000   # FDV threshold that triggers a moonshot Telegram alert
