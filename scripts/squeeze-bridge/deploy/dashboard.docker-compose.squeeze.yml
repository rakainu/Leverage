# Squeeze dashboard — same image as lighter-dashboard, pointed at squeeze.db.
# Publishes loopback 127.0.0.1:8095; Traefik routes squeeze.agentneo.cloud -> here.
#   docker compose -f docker-compose.squeeze.yml up -d --build
services:
  squeeze-dashboard:
    build: .
    image: lighter-dashboard:latest
    container_name: squeeze-dashboard
    restart: unless-stopped
    volumes:
      - /docker/squeeze-paper/data:/app/data   # read-only enforced via PRAGMA query_only
      - ./src:/app/src
      - ./templates:/app/templates
      - ./config.squeeze.yaml:/app/config.squeeze.yaml:ro
    command: ["python", "-u", "run_dashboard.py", "--config", "config.squeeze.yaml", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "127.0.0.1:8095:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
