services:
  hlsm-postgres:
    image: postgres:16-alpine
    container_name: hlsm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hlsm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hlsm_local_dev}
      POSTGRES_DB: hlsm
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "hlsm"]
      interval: 10s
      timeout: 3s
      retries: 5

  hlsm-redis:
    image: redis:7-alpine
    container_name: hlsm-redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  hlsm-bridge:
    build: .
    container_name: hlsm-bridge
    restart: unless-stopped
    env_file: .env
    environment:
      HLSM_PG_URL: postgresql+psycopg://hlsm:${POSTGRES_PASSWORD:-hlsm_local_dev}@hlsm-postgres:5432/hlsm
      HLSM_REDIS_URL: redis://hlsm-redis:6379/0
    depends_on:
      hlsm-postgres:
        condition: service_healthy
      hlsm-redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    ports:
      - "127.0.0.1:8789:8788"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8788/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
