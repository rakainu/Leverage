# HLSM-Bridge tunables. Hot-reloaded within ~30s. NEVER hardcode these in source.

# Convergence trigger
convergence:
  cluster_n: 3              # require N ranked wallets aligned
  window_minutes: 45        # within Y minutes of each other
  score_floor: 75           # wallet composite score gate

# Wallet scoring
scoring:
  min_trades: 50            # anti-fluke
  min_days_active: 30       # anti-fluke
  max_single_trade_pnl_pct: 50.0  # anti-fluke: no single-trade dominance
  recency_half_life_days: 30
  weights:
    sharpe: 0.30
    max_dd: 0.20
    win_rate: 0.20
    sample_size: 0.15
    recency: 0.15

# Executor / position sizing
executor:
  per_trade_margin_usdt: 50.0
  leverage: 10
  hard_sl_pct: 25.0           # margin-PnL %, e.g. 25 = stop when down 25% on margin
  tp_default_pct: 30.0        # margin-PnL %, e.g. 30 = take profit at +30% on margin
  max_concurrent_positions: 5
  exit_rule: median           # any | median | all (1/N, ceil(N/2)+1, N/N wallets out)
  signal_cooldown_minutes: 60 # persistent: don't re-enter same (coin, side) within this many minutes
                              # protects against restart-replay of recent convergence events

# Off-switches / safety
safety:
  daily_loss_pause_usdt: 100.0   # cumulative -USD day PnL trips circuit breaker
  paused_global: false
  paused_coins: []
  drain_mode: false

# Ingest
ingest:
  top_n_wallets: 100
  historical_days: 90
  ws_latency_alert_seconds: 30
  # Seed wallets: HL addresses to always track, even if leaderboard endpoint fails.
  # Add one address per line. The auto-leaderboard crawler unions with this list.
  seed_wallets: []

# Universe (auto-discovered at startup; this is the desired coverage list)
# Use canonical (Hyperliquid-style) symbols. The BloFin adapter translates to its
# venue-specific tickers (e.g. BONK -> 1000BONK-USDT, FLOKI -> 1000FLOKI-USDT).
universe:
  memecoin_perps:
    - PEPE
    - WIF
    - BONK
    - FARTCOIN
    - POPCAT
    - GOAT
    - MOODENG
    - DOGE
    - SHIB
    - TRUMP
    - FLOKI

# Telegram (channel-mode preferred; bot token + chat_id supplied via .env)
telegram:
  daily_summary_utc_hour: 0
  heartbeat_utc_hour: 0

# Dashboard
dashboard:
  feed_max_events: 20
  wallet_table_top_n: 50
