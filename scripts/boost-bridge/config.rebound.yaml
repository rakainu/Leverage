# Rebound — 1H VWAP-anchored range mean-reversion FADE, Lighter MAINNET (paper sim).
# Day-trade DIVERSIFIER alongside the scalper (different rhythm: 1h fade vs 15m fade).
# Validated 10-coin basket (scripts/scalping/analysis/donchian_breakout_2026-06-15):
# OOS PF 1.31, WR 71%, DD ~10%, max 3 consec losses, survives fees/slip, not one-coin.
# Live signal module (lighter_bridge/rebound.py) is parity-proven bar-for-bar vs the
# backtest. Replaces the sunset Booster (regime_mr clone) on this paper book.
connection:
  host: "http://lighter-gateway:8060"   # via shared lighter-gateway (scripts/marketdata); was https://mainnet.zklighter.elliot.ai
  initial_collateral_usdc: 3000        # realistic starting capital

execution:
  mode: paper                          # PaperClient simulation (no Lighter key needed)
  risk_frac: 0.025                     # (regime path only; rebound uses rebound.risk_frac)

signal_source: rebound                 # native Rebound VWAP-fade signal
exit_model: rebound                    # bank @ mean + runner trail + hard stop + time stop

symbols:                               # mainnet market IDs (verified 2026-06-15)
  BTC:  { market_id: 1,  enabled: true, margin_usdt: 200, leverage: 10 }
  ETH:  { market_id: 0,  enabled: true, margin_usdt: 200, leverage: 10 }
  SOL:  { market_id: 2,  enabled: true, margin_usdt: 200, leverage: 10 }
  XRP:  { market_id: 7,  enabled: true, margin_usdt: 200, leverage: 10 }
  DOGE: { market_id: 3,  enabled: true, margin_usdt: 200, leverage: 10 }
  SUI:  { market_id: 16, enabled: true, margin_usdt: 200, leverage: 10 }
  LINK: { market_id: 8,  enabled: true, margin_usdt: 200, leverage: 10 }
  AVAX: { market_id: 9,  enabled: true, margin_usdt: 200, leverage: 10 }
  BNB:  { market_id: 25, enabled: true, margin_usdt: 200, leverage: 10 }
  HYPE: { market_id: 24, enabled: true, margin_usdt: 200, leverage: 10 }

rebound:                               # CHAMPION config (validated)
  vwap_len: 48
  bb_len: 20
  bb_mult: 2.5
  adx_len: 14
  adx_max: 20
  atr_period: 14
  atr_min_pct: 0.4
  atr_stop: 2.5
  atr_trail: 2.0
  tp1_frac: 0.7
  max_bars: 24
  risk_frac: 0.025                     # 2.5% of equity to the hard stop = $75 on $3k,
                                       # COMPOUNDS as equity grows (Rich's call)
  max_leverage: 20
  stop_caps: { BTC: 1.2, ETH: 1.5, SOL: 1.8, DOGE: 2.2, SUI: 2.2, HYPE: 2.2 }
  default_stop_cap: 2.5                # XRP/LINK/AVAX/BNB

entry:
  timeframe: "1h"                      # Rebound is a 1-hour strategy
  min_abs_slope_pct: 0.0               # (unused by rebound; required by loader)
  require_retest: false
  ema_period: 9

notify:
  startup: true
  open: true
  close: true
  daily: true

control:
  telegram_enabled: true               # /kill, /off|on|close SYM|ALL, /status (reuse @myboosterbot)

loop:
  bar_poll_interval_s: 120             # 1h bars — poll for the new close every 2 min
  position_check_interval_s: 5
  mark_poll_interval_s: 8
  mark_stale_warn_s: 300
  mark_stale_fatal_s: 900

log:
  level: "INFO"
  db_path: "data/rebound.db"

# Compounding is inherent: risk = 2.5% of CURRENT equity, so $/trade grows with the
# account. No fixed-margin compounding block needed. Cooldown/withdrawal off for now.
sizing:
  mode: fixed
cooldown:
  enabled: false
withdrawal:
  enabled: false
