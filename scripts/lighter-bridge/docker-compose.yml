services:
  lighter-bridge:
    build: .
    image: lighter-bridge:latest
    container_name: lighter-bridge
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
