# Pro V3 SOL scale-out paper bridge — validated config (FINDINGS.md 2026-05-29).
# Real Pro V3 [SMRT Algo] webhooks (NOT the HA-flip replica) + EMA9 retest +
# ATR scale-out exits, paper on Lighter (zero-fee). Separate DB + container from
# the running replica/trail bridge.

connection:
  host: "https://mainnet.zklighter.elliot.ai"
  initial_collateral_usdc: 2000

signal_source: webhook        # real Pro V3 webhooks, not the replica
exit_model: scaleout         # bridge-computed single TP + single stop from entry±ATR
                             # (no TV exit alerts needed — one TP line, one stop line)

symbols:
  SOL:                        # SOL only — ZEC had no edge (FINDINGS.md)
    market_id: 2
    enabled: true
    margin_usdt: 250
    leverage: 30

# Entry: EMA9 retest only. Extra filters OFF (kept here, set to 0/empty so they're
# easy to re-enable if Rich wants more selectivity later: slope 0.12 / body 0.3-0.6 / Sunday).
entry:
  timeframe: "5m"
  require_retest: true        # keep the EMA(9) retest entry
  min_abs_slope_pct: 0.0      # OFF (was 0.12)
  block_body_band: null       # OFF (was [0.3, 0.6])
  block_weekdays: []          # OFF (was [6] = Sunday)
  ema_period: 9
  retest_overshoot_pct: 0.2
  slope_lookback_bars: 3
  retest_timeout_bars: 6

# Exits: ONE take-profit + ONE stop, both computed by the bridge at fill from ATR(14).
# R:R sweep on real Pro V3 SOL signals (sweep_rr.py, 2026-05-30): 4.0xATR stop + 1.5:1 TP
# was the sweet spot — net/PF beat the dead 1:1 in both entry timings, positive OOS.
#   SL = entry -/+ 4.0 * ATR ; TP = entry +/- (1.5 * 4.0) * ATR = 6.0 * ATR ; all-out at TP.
scaleout:
  sl_atr: 4.0                  # wide stop — the load-bearing parameter (FINDINGS + sweep_rr)
  tp_atr: [6.0, 6.0, 6.0]      # single TP at 1.5:1 (6.0xATR); tp2/tp3 unused (all-out at TP1)
  ratios: [1.0, 0.0, 0.0]      # ALL at TP1 (pure scalp). Stop flattens if TP not hit first.
  be_after_tp1: false          # irrelevant with all-out, kept explicit

webhook:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  path: "/webhook/pro-v3"
  secret: "CHANGE_ME_VIA_ENV"   # overridden by BRIDGE_SECRET at deploy

# Telegram: this bridge shares one bot+chat with the trail bridge. Silence the
# restart "Bridge UP" spam; keep entry/exit/daily. Identity set via TELEGRAM_SENDER_TAG
# env in the compose (= "PRO-V3") so its DMs are distinguishable from the trail bridge.
notify:
  startup: false               # no "Bridge UP" ping on every restart
  open: true                   # entry alerts
  close: true                  # exit alerts
  daily: true                  # daily summary

loop:
  bar_poll_interval_s: 30
  position_check_interval_s: 5

log:
  level: "INFO"
  db_path: "data/pro_v3_scaleout.db"
