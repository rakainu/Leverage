# Reclaim — V3.2 "honest twin" PAPER bridge (Lighter zero-fee). CAMPAIGN-TUNED.
#
# Native signals (no webhooks): the bridge computes the HA-V3 momentum-flip
# signal on its own 5m candle feed, waits for price to pull back and RECLAIM the
# EMA, and only enters when the reclaim close sits within max_gap_pct of EMA —
# the causal "honest twin" of the engine's non-causal ema[i] phantom fill.
# Both sides, fixed $250 margin @ 30x.
#
# 2026-06-25 EDGE CAMPAIGN (scripts/scalping/v3.2-analysis/RECLAIM_CAMPAIGN_SCORECARD.md)
# rebuilt this config from a LOSING live setup (PF 0.85, -$1528 @0.06% slip on
# 300d) to a validated edge: PF 1.67 / +$4702 / OOS PF 1.66 / survives 0.12% slip
# (PF 1.31) / 100% rolling-window stability. Changes vs the old live config:
#   entry  : EMA 9->12 | overshoot 0.2->0.10 | timeout 6->9 | slope 0.15->0.08
#   exits  : V3.2 $82.5 ladder -> Apex-style SL60/BE25/act25/dist8 (no $82 SL)
#   filter : + block_hours UTC 3-6 (dead-zone; OOS net +43%, PF 1.17->1.31)
#   coins  : 7 -> 5 (cut HYPE/XRP: net-negative + low rolling stability under EMA12)
#   risk   : + cooldown 3-loss/60m breaker
# Pending live A/B (Step 8): maker-limit entry — deploy MARKET, measure real
# entry slip, switch to maker if it's >~0.04% (the sim can't reward it).
#
# Deploy:  docker compose -f docker-compose.reclaim.yml up -d --build
# Separate DB (reclaim.db) + container + Telegram bot ("Reclaim") from all other
# bridges. Each bridge's cooldown counter is its OWN in-memory state — other
# strategies' losses never affect this one.

connection:
  host: "http://lighter-gateway:8060"
  initial_collateral_usdc: 3600        # 5 coins x $250 margin = $1,250 max if all open + buffer

signal_source: replica                 # native HA-V3 flip -> EMA reclaim-retest
exit_model: trail                      # trail ladder (state_machine.step)

# 5-coin basket (campaign Step 9, EMA12 + rolling stability). FIXED $250 @ 30x.
# Cut from the old 7: HYPE/XRP were net-negative with low rolling-window keep%
# (XRP 25%, HYPE 50%) under the tuned config. Removed market_ids for easy re-add:
#   XRP=7, HYPE=24. Final-set coins all STABLE-KEEP (75-100% window stability).
symbols:
  BTC:  { market_id: 1,  enabled: true, margin_usdt: 250, leverage: 30 }
  SOL:  { market_id: 2,  enabled: true, margin_usdt: 250, leverage: 30 }
  DOGE: { market_id: 3,  enabled: true, margin_usdt: 250, leverage: 30 }
  BNB:  { market_id: 25, enabled: true, margin_usdt: 250, leverage: 30 }
  ZEC:  { market_id: 90, enabled: true, margin_usdt: 250, leverage: 30 }

pine:                                  # HA-V3 signal params (byte-identical to engine)
  sensitivity: 8
  noise: 0.0
  fakeout: 0.2
  range_filter: 0.2

entry:
  timeframe: "5m"
  ema_period: 12                       # campaign Step 6: 9->12 (same net, half the DD, OOS PF 1.42)
  slope_lookback_bars: 3
  retest_overshoot_pct: 0.10           # Step: tightened 0.2->0.10 (wick may pierce EMA by <=0.10%)
  retest_timeout_bars: 15              # 2026-06-27: 9->15. Live funnel: 61% of signals EXPIRED (retest not done in 9 bars) -> 0 fills/1.6d. 5-coin M13 sweep: to15 = +27% fills, net 4727->6040, PF 1.67->1.68, OOS PF 1.68->1.70. Knee ~15; >18 decays.
  require_retest: true
  require_reclaim: true                # M13 — bar must CLOSE BACK across EMA (bounce)
  max_gap_pct: 0.05                    # validated knee: skip if |close-ema|/ema > 0.05%
  min_abs_slope_pct: 0.08              # Step: 0.15->0.08 (Entry B)
  block_body_band: [0.3, 0.5]          # block the chop body band
  block_weekdays: [6]                  # no Sunday
  block_hours: [3, 4, 5, 6]            # Step 3: block the UTC dead zone (OOS net +43%, PF 1.17->1.31)

exits:                                 # Apex-style ladder (NO $82 SL). $250 @ 30x.
  sl_loss_usdt: 60.0                   # hard stop -$60
  breakeven_usdt: 25.0                 # at +$25 -> SL to entry
  lock_profit_activate_usdt: 25.0      # at +$25 lock...
  lock_profit_usdt: 20.0               # ...+$20
  trail_activate_usdt: 25.0            # ...and start trailing
  trail_start_usdt: 25.0
  trail_distance_usdt: 8.0             # trail $8 behind the favorable extreme
  tp_ceiling_pct: 2.0                  # hard TP cap = 2x margin = $500 (near-never safety)

sizing:
  mode: fixed                          # fixed $250/coin (switch to compound once proven live)

# News-rip circuit breaker (Rich, 2026-06-25): 3 losing closes in a row across
# Reclaim's OWN basket -> block ALL Reclaim entries 60m, then auto-resume.
# This counter is per-bridge; other strategies' losses do not affect it.
cooldown:
  enabled: true
  consec_losses: 3
  minutes: 60

notify:
  startup: true
  open: true
  close: true
  daily: true

control:
  telegram_enabled: true               # /off /on /close /status /kill per-ticker control

loop:
  bar_poll_interval_s: 30
  position_check_interval_s: 5
  mark_poll_interval_s: 3

log:
  level: INFO
  db_path: data/reclaim.db
