# Dashboard config for the Scalper regime-MR paper bridge.
# Same code as the Lighter dashboard, pointed at the scalper bridge's DB
# (/docker/scalper-paper/data/scalper.db, mounted into the container).
db_path: "data/scalper.db"
lighter_host: "https://mainnet.zklighter.elliot.ai"
initial_collateral_usdc: 3600   # MUST match bridge config.scalper.yaml (connection.initial_collateral_usdc) — else phantom equity/DD
title: "Scalper"
subtitle: "regime_mr · VWAP-z fade · Lighter zero-fee · 8 coins"
show_fill_quality: true   # scalper arms resting maker limits — maker-edge panel is meaningful
symbols:                          # name -> market_id (live Lighter ids); LIVE 8-coin basket (2026-06-20)
  ETH: 0
  BTC: 1
  SOL: 2
  HYPE: 24
  BNB: 25
  XMR: 77
  DOGE: 3
  SUI: 16
refresh:
  live_ms: 3000
  static_ms: 15000
mark_cache_ttl_s: 2.0
