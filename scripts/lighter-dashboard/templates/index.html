<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lighter Dashboard</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(6,182,212,.07), transparent 60%),
        radial-gradient(1000px 500px at 0% 0%, rgba(16,185,129,.06), transparent 55%),
        #0b0e14;
      color:#e5e7eb; font-size:15px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .panel {
      background:#161a23; border:1px solid #252b38; border-radius:12px; padding:16px;
      box-shadow:0 1px 2px rgba(0,0,0,.4); transition:border-color .15s ease;
    }
    .panel:hover { border-color:#33405a; }
    /* Section headings — bold white with an emerald→cyan accent bar */
    .label {
      font-size:12.5px; letter-spacing:1.3px; text-transform:uppercase;
      color:#f8fafc; font-weight:700;
      display:flex; align-items:center; gap:8px;
    }
    .label::before {
      content:""; width:3px; height:14px; border-radius:2px; flex:none;
      background:linear-gradient(180deg,#34d399,#06b6d4);
    }
    /* Section headings get a divider rule beneath them */
    .label--rule { border-bottom:2px solid #5b6580; padding-bottom:9px; }
    /* Segmented Day/Week/Month toggle */
    .seg { display:inline-flex; gap:3px; }
    .seg-btn {
      font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px;
      color:#9aa6b8; background:#10141c; border:1px solid #252b38;
      cursor:pointer; text-decoration:none; user-select:none;
    }
    .seg-btn:hover { color:#e5e7eb; border-color:#33405a; }
    .seg-btn.on { color:#08111a; background:linear-gradient(180deg,#34d399,#06b6d4); border-color:transparent; }
    table { font-size:14px; }
    th {
      color:#cbd5e1; font-weight:600; text-align:left;
      text-transform:uppercase; font-size:11.5px; letter-spacing:.5px;
      border-bottom:2px solid #5b6580;
    }
    td, th { padding:6px 8px; }
    .pos { color:#34d399; } .neg { color:#f87171; } .mut { color:#9aa6b8; }
    /* Pulsing dot on the Live status pill */
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.35; } }
    .live-dot { animation: pulse 1.6s ease-in-out infinite; }
    /* Scrollable panel bodies (~6 rows for trades, ~4 for signals) */
    .scroll-6, .scroll-4 { overflow-y:auto; }
    .scroll-6 { max-height:220px; }
    .scroll-4 { max-height:128px; }
    .scroll-6::-webkit-scrollbar, .scroll-4::-webkit-scrollbar { width:8px; }
    .scroll-6::-webkit-scrollbar-track, .scroll-4::-webkit-scrollbar-track { background:transparent; }
    .scroll-6::-webkit-scrollbar-thumb, .scroll-4::-webkit-scrollbar-thumb { background:#2f3645; border-radius:4px; }
    .scroll-6::-webkit-scrollbar-thumb:hover, .scroll-4::-webkit-scrollbar-thumb:hover { background:#3c4456; }
    .scroll-6 thead th { position:sticky; top:0; background:#161a23; z-index:1; }
  </style>
</head>
<body class="p-5">
  <header class="flex items-center justify-between mb-5">
    <h1 class="text-2xl font-extrabold tracking-tight">
      <span style="background:linear-gradient(90deg,#34d399,#06b6d4); -webkit-background-clip:text; background-clip:text; color:transparent;">Lighter</span>
      <span class="mut font-normal text-base">paper bridge</span>
    </h1>
    <div class="flex items-center gap-4">
      <div hx-get="/panel/status" hx-trigger="load, every 5s" hx-swap="innerHTML"></div>
      <span class="label">{{ cfg.symbols.keys()|join(' · ') }}</span>
    </div>
  </header>

  <!-- A: KPI strip (live). Loads once; the returned fragment self-polls and
       carries the selected Realized window (day/week/month/all) forward. -->
  <div hx-get="/panel/kpis?window=all" hx-trigger="load" class="mb-4"></div>

  <!-- B: Equity curve (static) -->
  <div hx-get="/panel/equity" hx-trigger="load, every {{ cfg.static_ms // 1000 }}s" class="mb-4"></div>

  <div class="grid grid-cols-3 gap-4 mb-4">
    <!-- C: Open positions (live) -->
    <div hx-get="/panel/positions" hx-trigger="load, every {{ cfg.live_ms // 1000 }}s"></div>
    <!-- D: Closed trades (static) -->
    <div class="col-span-2" hx-get="/panel/closed" hx-trigger="load, every {{ cfg.static_ms // 1000 }}s"></div>
  </div>

  <div class="grid grid-cols-3 gap-4">
    <!-- E: Exit reasons --><div hx-get="/panel/exits" hx-trigger="load, every {{ cfg.static_ms // 1000 }}s"></div>
    <!-- F: Per-symbol --><div hx-get="/panel/symbols" hx-trigger="load, every {{ cfg.static_ms // 1000 }}s"></div>
    <!-- G: Signals --><div hx-get="/panel/signals" hx-trigger="load, every {{ cfg.static_ms // 1000 }}s"></div>
  </div>
</body>
</html>
