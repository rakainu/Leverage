services:
  lighter-dashboard:
    build: .
    image: lighter-dashboard:latest
    container_name: lighter-dashboard
    restart: unless-stopped
    volumes:
      # Read-write mount REQUIRED for WAL sidecar files (-wal/-shm).
      # The app enforces read-only at the SQLite layer (PRAGMA query_only=ON).
      - /docker/lighter-paper/data:/app/data
    # Traefik on this host runs in network_mode: host and routes via its FILE
    # provider (/docker/traefik-mncm/config/lighter.yml), not docker labels.
    # So we publish a loopback-only host port; Traefik reaches it at
    # 127.0.0.1:8092 and terminates TLS + basic-auth in front. Binding to
    # 127.0.0.1 keeps the app off the public interface except via Traefik.
    ports:
      - "127.0.0.1:8092:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
