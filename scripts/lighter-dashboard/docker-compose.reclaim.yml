# Reclaim dashboard — shared lighter-dashboard image, pointed at reclaim.db.
# Publishes loopback 127.0.0.1:8097; Traefik routes reclaim.agentneo.cloud -> here.
#   docker compose -f docker-compose.reclaim.yml up -d
services:
  reclaim-dashboard:
    image: lighter-dashboard:latest
    container_name: reclaim-dashboard
    restart: unless-stopped
    volumes:
      - /docker/reclaim-bridge/data:/app/data   # read-only enforced via PRAGMA query_only
      - ./src:/app/src
      - ./templates:/app/templates
      - ./config.reclaim.yaml:/app/config.reclaim.yaml:ro
    command: ["python","-u","run_dashboard.py","--config","config.reclaim.yaml","--host","0.0.0.0","--port","8080"]
    ports:
      - "127.0.0.1:8097:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
