# Rebound dashboard — same image as lighter-dashboard, pointed at rebound.db.
# Publishes loopback 127.0.0.1:8098; Traefik routes rebound.agentneo.cloud -> here.
# Reads the rebound bridge's DB (/docker/boost-testnet/data) read-only.
#   docker compose -f docker-compose.rebound.yml up -d --build
services:
  rebound-dashboard:
    build: .
    image: lighter-dashboard:latest
    container_name: rebound-dashboard
    restart: unless-stopped
    volumes:
      - /docker/boost-testnet/data:/app/data   # read-only enforced via PRAGMA query_only
      - ./src:/app/src
      - ./templates:/app/templates
      - ./config.rebound.yaml:/app/config.rebound.yaml:ro
    command: ["python", "-u", "run_dashboard.py", "--config", "config.rebound.yaml", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "127.0.0.1:8098:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
