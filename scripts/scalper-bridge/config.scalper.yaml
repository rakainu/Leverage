# Scalper — regime-gated VWAP mean-reversion PAPER bridge (Lighter zero-fee).
# Native signals (no webhooks): computes EMA-trend gate + VWAP z-score on its own
# 15m candle feed for the 5-coin basket, long+short, FIXED notional, maker-limit
# entry. Validated: scripts/scalping/analysis/scalp_search_2026-05-30/STRATEGY.md
#   pooled PF 1.49 | 89% WR | 192 trades/wk | OOS 1.42 | walk-forward 4/4 |
#   2x-slip 1.43 | all 5 coins PF>=1.33 | 10x = 0 liquidations.
#
# Deploy:  docker compose -f docker-compose.scalper.yml up -d --build
# Separate DB (scalper.db) + container + Telegram bot ("Scalper") from other bridges.

connection:
  host: "https://mainnet.zklighter.elliot.ai"
  initial_collateral_usdc: 6000        # paper start: $500 margin x 10 coins ($5000) + ~20% buffer

signal_source: regime                  # native regime_mr signal computation
exit_model: regime                     # fixed SL + TP (maker target) + time stop

# 10-coin test basket (2026-06-04). Uniform $500 margin @ 10x = $5000 notional each.
# 10x = validated sweet spot (0 liquidations, best net/DD, full PF). Uniform sizing
# = apples-to-apples per-coin PF/WR comparison to decide which coins to keep.
# Coins are the most-liquid Lighter crypto perps by 24h volume. Per-ticker entries
# can be toggled live via Telegram (/off SYM, /on SYM) — see `control:` below.
# The old WS-flakiness reason for disabling coins is gone (REST snapshot mark feed).
symbols:                               # market_id : 24h vol on Lighter
  ETH:  { market_id: 0,  enabled: true, margin_usdt: 500, leverage: 10 }   # $558M
  BTC:  { market_id: 1,  enabled: true, margin_usdt: 500, leverage: 10 }   # $1.68B (re-enabled)
  SOL:  { market_id: 2,  enabled: true, margin_usdt: 500, leverage: 10 }   # $71M
  XRP:  { market_id: 7,  enabled: true, margin_usdt: 500, leverage: 10 }   # $3.5M
  # WLD benched 2026-06-09 (n=6 noise + stranded-short bug). DISABLED 2026-06-10:
  # its orphaned short has now exited (flat), so it no longer needs to load feeds.
  # Keeping it enabled added an 11th feed and pushed total Lighter REST rate over the
  # ~1.4/s budget -> chronic 429s. Re-enable + DB switch ON to re-test.
  WLD:  { market_id: 6,  enabled: false, margin_usdt: 500, leverage: 10 }   # $7M  (benched, flat)
  # NEAR benched 2026-06-09 — heavy loser (-$257 / 18 trades). DISABLED 2026-06-10:
  # open long (#170) has exited (flat); dropping its feed to stay under the REST budget.
  NEAR: { market_id: 10, enabled: false, margin_usdt: 500, leverage: 10 }   # $3.6M (benched, flat)
  TON:  { market_id: 12, enabled: true, margin_usdt: 500, leverage: 10 }   # $8M
  HYPE: { market_id: 24, enabled: true, margin_usdt: 500, leverage: 10 }   # $218M
  BNB:  { market_id: 25, enabled: true, margin_usdt: 500, leverage: 10 }   # $4.2M
  ZEC:  { market_id: 90, enabled: true, margin_usdt: 500, leverage: 10 }   # $42M
  # New blood 2026-06-09 — deepest untested Lighter perps (>> LINK/SUI liquidity).
  # MKR is an INACTIVE market on Lighter (empty book, last_price=0) — disabled.
  MKR:  { market_id: 28, enabled: false, margin_usdt: 500, leverage: 10 }  # inactive market
  XMR:  { market_id: 77, enabled: true, margin_usdt: 500, leverage: 10 }   # $4.8M

# regime_mr params (the strategy's real knobs — locked from the validated config)
regime:
  trend_len: 200          # EMA length for the higher-tf trend gate
  slope_lb: 20            # slope = EMA - EMA.shift(20); sign sets the regime
  z_period: 30            # z-score window for (Close - sessionVWAP)
  z_entry: 1.5            # |z| threshold to fade
  sl_atr: 2.0             # hard stop = entry -/+ 2.0*ATR
  tp_frac: 0.3            # take-profit = 0.3 * |VWAP - limit entry|
  max_bars: 12            # time stop (12 * 15m = 3h)
  limit_atr: 0.25         # maker limit offset beyond close, in ATR
  atr_period: 14
  entry_valid_bars: 3     # cancel the resting limit if unfilled after 3 bars

# Entry block: only `timeframe` is used by the regime path (drives the bar feed).
entry:
  timeframe: "15m"
  min_abs_slope_pct: 0.0
  require_retest: false
  ema_period: 9
  retest_overshoot_pct: 0.2
  slope_lookback_bars: 3
  retest_timeout_bars: 6

notify:
  startup: true          # "Scalper UP" ping on (re)start — fresh dedicated bot
  open: true
  close: true
  daily: true

control:
  telegram_enabled: true # inbound Telegram control: /off SYM /on SYM /close SYM /status
                         # authorized to TELEGRAM_CHAT_ID (.env) only

loop:
  bar_poll_interval_s: 90      # 15m bars — feeds staggered+jittered; 90s × 9 active
                               # coins = ~1 candle req/10s, under Lighter's WAF rate
                               # limit on /candlesticks (incident 2026-06-04). Still
                               # catches a 15m close within ~1.5min.
  position_check_interval_s: 5 # SL/TP check on the live mark every 5s
  mark_poll_interval_s: 8      # PER-MARKET order-book refresh period. Polls are
                               # round-robin (~1 req/0.9s for 9 active coins = ~1.1/s),
                               # NOT a burst — keeps TOTAL Lighter REST rate (mark+bar)
                               # under the proven-safe ~1.4/s budget and off the WAF/429
                               # (incidents 2026-06-04 WAF, 2026-06-10 429). Marks stay
                               # <=8s old (fine for 2ATR stops). RULE: each coin ADDED
                               # back must keep total <=~1.4/s, else raise this interval.
  mark_stale_warn_s: 300
  mark_stale_fatal_s: 900      # last-resort full restart (only if OPEN position + polls failing)

log:
  level: "INFO"
  db_path: "data/scalper.db"
