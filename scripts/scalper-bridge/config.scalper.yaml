# Scalper — regime-gated VWAP mean-reversion PAPER bridge (Lighter zero-fee).
# Native signals (no webhooks): computes EMA-trend gate + VWAP z-score on its own
# 15m candle feed for the 6-coin basket, long+short, FIXED notional, maker-limit
# entry. Validated: scripts/scalping/analysis/scalp_search_2026-05-30/STRATEGY.md
#   pooled PF 1.49 | 89% WR | 192 trades/wk | OOS 1.42 | walk-forward 4/4 |
#   2x-slip 1.43 | all 5 coins PF>=1.33 | 10x = 0 liquidations.
#
# Deploy:  docker compose -f docker-compose.scalper.yml up -d --build
# Separate DB (scalper.db) + container + Telegram bot ("Scalper") from other bridges.

connection:
  host: "http://lighter-gateway:8060"
  initial_collateral_usdc: 3600        # 6 coins x $500 margin ($3000 notional) + 20% buffer

signal_source: regime                  # native regime_mr signal computation
exit_model: regime                     # fixed SL + TP (maker target) + time stop

# 6-coin live basket (2026-06-14). Trimmed from 10 -> 6: XRP/ZEC/TON/NEAR/WLD/MKR
# removed as net losers (combined -$1,242, all 67-76% WR vs ~84% breakeven); history
# archived (docs/scalper/dead-coins-2026-06-14/) and purged from scalper.db. Kept set
# = proven winners: +$1,685 / 85.8% WR / PF 1.92 over 219 trades. Uniform $500 margin
# @ 10x = $5000 notional each (validated sweet spot: 0 liquidations, best net/DD).
# Per-ticker entries toggle live via Telegram (/off SYM, /on SYM) — see `control:`.
symbols:                               # market_id : 24h vol on Lighter
  ETH:  { market_id: 0,  enabled: true, margin_usdt: 500, leverage: 10 }   # $558M
  BTC:  { market_id: 1,  enabled: false, margin_usdt: 500, leverage: 10 }   # $1.68B (re-enabled)
  SOL:  { market_id: 2,  enabled: false, margin_usdt: 500, leverage: 10 }   # $71M
  HYPE: { market_id: 24, enabled: true, margin_usdt: 500, leverage: 10 }   # $218M
  BNB:  { market_id: 25, enabled: true, margin_usdt: 500, leverage: 10 }   # $4.2M
  XMR:  { market_id: 77, enabled: false, margin_usdt: 500, leverage: 10 }   # $4.8M
  # Basket expansion 2026-06-20. Validated on 90d OKX 15m, live regime_mr params
  # + accel 3.0 (regime_newcoins.py): both clear the bar IN and OUT of sample at
  # the existing-basket profile. DOGE OOS +$113/PF 2.34/92%WR; SUI OOS +$61/PF
  # 1.51/91%WR. (AVAX/LINK REJECTED — negative in-sample; XRP excluded — already
  # cut as a loser.) Per-coin sizing unchanged ($500@10x); collateral left at
  # 3600 (sizing is per-coin, not basket-scaled) — watch logs for margin
  # contention if 8 coins open at once. REVERT = set enabled:false on both.
  DOGE: { market_id: 3,  enabled: false, margin_usdt: 500, leverage: 10 }
  SUI:  { market_id: 16, enabled: false, margin_usdt: 500, leverage: 10 }
regime:
  trend_len: 200          # EMA length for the higher-tf trend gate
  slope_lb: 20            # slope = EMA - EMA.shift(20); sign sets the regime
  z_period: 30            # z-score window for (Close - sessionVWAP)
  z_entry: 1.5            # |z| threshold to fade
  sl_atr: 1.75             # hard stop = entry -/+ 1.75*ATR
  tp_frac: 0.3            # take-profit = 0.3 * |VWAP - limit entry|
  max_bars: 12            # time stop (12 * 15m = 3h)
  limit_atr: 0.25         # maker limit offset beyond close, in ATR
  atr_period: 14
  entry_valid_bars: 3     # cancel the resting limit if unfilled after 3 bars
  # Acceleration guard (2026-06-20). Skip fading a signal bar whose range
  # (High-Low) >= accel_mult*ATR — a news-rip / volatility-climax bar, the source
  # of the rare full-2ATR stop that ate the thin wins. Validated on the live
  # 6-coin basket over the current 45d window (fresh_basket_test.py): pooled
  # PF 1.46->1.54, maxDD 4.7%->4.1%, helps 4/5 coins (BNB 1.81->2.20), ~1% fewer
  # trades, 0 liquidations. REVERT = set accel_mult: 0.0 + restart.
  accel_mult: 3.0
  # Trend-clarity gate (2026-06-20). Require |EMA200-slope|% over slope_lb bars
  # >= this before fading against the trend. The sign-only gate fires into a
  # flat-but-rising tape (shorts a rally) and gets run over — forensic on the
  # worst losing 10-day window showed it was ALL shorts (-$768/-$926) with
  # near-zero slope. Validated across 9 time-chunks (slope_gate_test.py): 0.08
  # nearly eliminates that window (-$926 -> -$126), LIFTS total net +20%, good
  # windows stay above baseline — drops only net-losing ambiguous-trend fades,
  # not good trades. REVERT = set min_slope_pct: 0.0 + restart.
  min_slope_pct: 0.08
  # Per-side overrides (2026-06-26). Longs left on the base (z 1.5 / slope 0.08);
  # shorts loosened to take MORE shorts — the validated edge. Live long/short review
  # (PF: short 1.55 vs long 0.81) + sim validation (side_asym_validate.py, 180d
  # IS/OOS + 6 regime segments): OOS net +23->+28%, PF held 1.94, DD better, 0 liq,
  # shorts net-POSITIVE in every UP-drift segment. Longs UNTOUCHED (they earn over a
  # cycle; the recent long bleed was regime, not structure). REVERT = delete these
  # two lines + restart (falls back to symmetric base).
  z_entry_short: 1.25
  min_slope_pct_short: 0.05

# Entry block: only `timeframe` is used by the regime path (drives the bar feed).
entry:
  timeframe: "15m"
  min_abs_slope_pct: 0.0
  require_retest: false
  ema_period: 9
  retest_overshoot_pct: 0.2
  slope_lookback_bars: 3
  retest_timeout_bars: 6

notify:
  startup: true          # "Scalper UP" ping on (re)start — fresh dedicated bot
  open: true
  close: true
  daily: true

control:
  telegram_enabled: true # inbound Telegram control: /off SYM /on SYM /close SYM /status
                         # authorized to TELEGRAM_CHAT_ID (.env) only

loop:
  bar_poll_interval_s: 90      # 15m bars — feeds staggered+jittered; 90s × 6 coins
                               # = ~1 candle req/9s, under Lighter's WAF rate limit
                               # on /candlesticks (incident 2026-06-04). Still catches
                               # a 15m close within ~1.5min.
  position_check_interval_s: 5 # SL/TP check on the live mark every 5s
  mark_poll_interval_s: 8      # PER-MARKET order-book refresh period. Polls are
                               # round-robin (1 req/~1.3s for 6 coins = ~0.75/s),
                               # NOT a 6-wide burst — keeps total REST rate at the
                               # proven-safe ~1.3/s and off Lighter's WAF (incident
                               # 2026-06-04). Marks stay <=8s old (fine for 2ATR stops).
  mark_stale_warn_s: 300
  mark_stale_fatal_s: 900      # last-resort full restart (only if OPEN position + polls failing)

log:
  level: "INFO"
  db_path: "data/scalper.db"

# News-rip circuit breaker (2026-06-14). After consec_losses losing closes
# in a row across the whole basket, block ALL new entries for the set minutes, then
# auto-resume.
# Backtest cooldown(3,180m) on the validated 5-coin set: pooled PF 1.49->1.58,
# OOS 1.42->1.47, walk-forward floor 1.42->1.44, max-DD -52%, ~4% fewer trades,
# 0 liquidations. REVERT = set enabled:false (one line) + restart.
cooldown:
  enabled: true
  consec_losses: 3
  minutes: 180

# Position sizing (2026-06-14). compound = margin scales with live account equity
# (base_equity -> base margin per coin), capped at base x cap_mult and floored at 0
# on drawdown. See src/lighter_bridge/sizing.py (unit-tested, paper == live).
sizing:
  mode: compound
  base_equity: 3600      # equity at which a coin trades its base $500 margin
  cap_mult: 3.0          # margin/notional never exceeds 3x base ($1,500 margin / $15k notl)

# Weekly profit withdrawal. Skims REALIZED equity above base_equity x target_mult
# ($10,800), once per ISO week, to the withdrawals ledger + Telegram + dashboard.
# Never touches unrealized P&L. REVERT = set enabled:false.
withdrawal:
  enabled: true
  cadence: weekly
  target_mult: 3.0
