# Scalper PAPER bridge — native regime-gated VWAP mean-reversion on Lighter (zero-fee).
# Own image, own DB (data/scalper.db), own container, own Telegram bot ("Scalper").
# No inbound port (native signals, no webhook).
#
# Deploy:  docker compose -f docker-compose.scalper.yml up -d --build
services:
  scalper-bridge:
    build: .
    image: scalper-bridge:latest
    container_name: scalper-bridge
    restart: unless-stopped
    env_file:
      - .env                         # TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID (Scalper bot)
    environment:
      TELEGRAM_SENDER_TAG: "SCALPER"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./config.scalper.yaml:/app/config.scalper.yaml:ro
    command: ["python", "-u", "run_bridge.py", "--config", "config.scalper.yaml"]
    networks:
      - default
      - lighter-net
    healthcheck:
      test: ["CMD-SHELL", "find /app/data/scalper.db /app/data/scalper.db-wal -mmin -15 -type f 2>/dev/null | grep -q . || exit 1"]
      interval: 5m
      timeout: 15s
      start_period: 3m
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
  lighter-net:
    external: true
