services:
  blofin-bridge:
    build: .
    container_name: blofin-bridge
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    ports:
      - "127.0.0.1:8787:8787"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8787/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
