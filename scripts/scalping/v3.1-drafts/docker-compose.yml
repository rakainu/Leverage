services:
  scalping-v3.1:
    build: .
    container_name: scalping-v3.1
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    ports:
      # Host port 8788 — same as v3. v3.1 is mutually exclusive with v3
      # (both bind 8788 and would race the same BloFin account on positions).
      # See SWITCH.md for the v3 <-> v3.1 flip commands.
      - "127.0.0.1:8788:8787"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8787/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
