# Scalping V3.2 — V3.1 strategy DNA (slope/Sunday/body filters + 5-stage trail)
# with a SELF-GENERATED HA-V3 entry signal replacing the TradingView Pro V3
# webhook. 7-coin basket — each validated through the engine (PF>=2.76 demo,
# robust ex-top3, survives BloFin fees, both sides positive). Identical %-based
# geometry per coin: $250 margin x 30x = $7,500 notional, $82.50 stop = 1.1%.

defaults:
  margin_usdt: 100
  leverage: 30
  margin_mode: isolated
  position_mode: net
  sl_policy: p2_step_stop
  sl_loss_usdt: 13
  breakeven_usdt: 12
  lock_profit_activate_usdt: 18
  lock_profit_usdt: 15
  trail_activate_usdt: 30
  trail_start_usdt: 32
  trail_distance_usdt: 15
  tp_limit_margin_pct: 2.0
  ema_retest_period: 9
  ema_retest_timeframe: "5m"
  ema_retest_timeout_minutes: 30
  ema_retest_max_overshoot_pct: 0.2
  min_5m_slope_pct: 0.15
  poll_interval_seconds: 2
  block_weekdays_utc: [6]
  block_body_atr_band: [0.3, 0.5]
  min_body_atr_ratio: 0.0
  # --- V3.2 self-generated HA-V3 signal ---
  signal_source: ha_v3
  signal_sensitivity: 8
  signal_fakeout: 0.2
  signal_range_filt: 0.2
  signal_lookback_bars: 300
  signal_scan_interval_seconds: 30
  signal_min_adx: 0.0

# 7-coin basket. All use $250 margin / 30x / $82.50 stop (= the exact %-geometry
# every coin was validated at). Per-coin demo backtest (120d, HYPE 31d):
#   ZEC PF3.09  XRP PF3.30  DOGE PF2.93  SOL PF2.82  BTC PF3.86  BNB PF4.16  HYPE PF2.76
symbols:
  ZEC-USDT:  {enabled: true, margin_usdt: 250, leverage: 30, margin_mode: isolated, sl_policy: p2_step_stop, sl_loss_usdt: 82.50}
  XRP-USDT:  {enabled: true, margin_usdt: 250, leverage: 30, margin_mode: isolated, sl_policy: p2_step_stop, sl_loss_usdt: 82.50}
  DOGE-USDT: {enabled: true, margin_usdt: 250, leverage: 30, margin_mode: isolated, sl_policy: p2_step_stop, sl_loss_usdt: 82.50}
  SOL-USDT:  {enabled: true, margin_usdt: 250, leverage: 30, margin_mode: isolated, sl_policy: p2_step_stop, sl_loss_usdt: 82.50}
  BTC-USDT:  {enabled: true, margin_usdt: 250, leverage: 30, margin_mode: isolated, sl_policy: p2_step_stop, sl_loss_usdt: 82.50}
  BNB-USDT:  {enabled: true, margin_usdt: 250, leverage: 30, margin_mode: isolated, sl_policy: p2_step_stop, sl_loss_usdt: 82.50}
  HYPE-USDT: {enabled: true, margin_usdt: 250, leverage: 30, margin_mode: isolated, sl_policy: p2_step_stop, sl_loss_usdt: 82.50}
